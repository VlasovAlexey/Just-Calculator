<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Simple elegant calculator inspired by Google Android Calculator. Dark & light themes, scientific functions, PWA support.">
    <meta name="theme-color" content="#000000" id="meta-theme-color">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Calculator">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="msapplication-TileColor" content="#000000">
    <meta name="msapplication-TileImage" content="icons/icon-144x144.png">

    <!-- Open Graph / Social Preview (Telegram, Facebook, etc.) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="JustCalculator">
    <meta property="og:description" content="Simple elegant calculator with dark & light themes, scientific functions, and PWA support.">
    <meta property="og:image" content="icons/og-image.png">
    <meta property="og:image:width" content="512">
    <meta property="og:image:height" content="512">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="JustCalculator">
    <meta name="twitter:description" content="Simple elegant calculator with dark & light themes and scientific functions.">
    <meta name="twitter:image" content="icons/og-image.png">

    <link rel="stylesheet" href="./src/css/styles.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16x16.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <title>Calculator</title>
</head>

<body>
    <div class="calculator">
        <div class="top-bar">
            <a href="https://github.com/VlasovAlexey/Just-Calculator" target="_blank" class="icon-btn" id="github-link">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
            <button type="button" onclick="toggleTheme()" class="icon-btn" id="theme-toggle">
                <svg class="icon-svg" id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="icon-svg" id="moon-icon" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
        <input type="text" id="display" class="display" readonly>
        <div id="preview" class="preview"></div>
        <div class="rever-flex">
            <div class="reverse">
                <button onclick="appendToDisplay('o_b')" class="Btn-rvs">(</button>
                <button onclick="appendToDisplay('c_b')" class="Btn-rvs">)</button>
                <button onclick="appendToDisplay('')" class="Btn-rvs">mc</button>
                <button onclick="appendToDisplay('')" class="Btn-rvs">m+</button>
                <button onclick="appendToDisplay('')" class="Btn-rvs">m-</button>
                <button onclick="appendToDisplay('')" class="Btn-rvs">mr</button>
                <button onclick="appendToDisplay('')" class="Btn-rvs">2nd</button>
                <button onclick="appendToDisplay('^2')" class="Btn-rvs">x&#178;</button>
                <button onclick="appendToDisplay('^3')" class="Btn-rvs">x&#179;</button>
                <button onclick="appendToDisplay('^')" class="Btn-rvs">x<sup>y</sup></button>
                <button onclick="appendToDisplay('e^')" class="Btn-rvs">e<sup>x</sup></button>
                <button onclick="appendToDisplay('10^')" class="Btn-rvs">10<sup>x</sup></button>
                <button onclick="appendToDisplay('1/')" class="Btn-rvs">1/x</button>
                <button onclick="appendToDisplay('sqrt')" class="Btn-rvs">&#8730;x</button>
                <button onclick="appendToDisplay('cbrt')" class="Btn-rvs">&#8731;x</button>
                <button onclick="appendToDisplay('abs')" class="Btn-rvs">|x|</button>
                <button onclick="appendToDisplay('ln')" class="Btn-rvs">ln</button>
                <button onclick="appendToDisplay('log10')" class="Btn-rvs">log<sub>10</sub></button>
                <button onclick="Factorial()" class="Btn-rvs">x!</button>
                <button onclick="appendToDisplay('sin')" class="Btn-rvs">sin</button>
                <button onclick="appendToDisplay('cos')" class="Btn-rvs">cos</button>
                <button onclick="appendToDisplay('tan')" class="Btn-rvs">tan</button>
                <button onclick="appendToDisplay('e')" class="Btn-rvs">e</button>
                <button onclick="appendToDisplay('EE')" class="Btn-rvs">EE</button>
                <button onclick="appendToDisplay('')" class="Btn-rvs">Rad</button>
                <button onclick="appendToDisplay('sih')" class="Btn-rvs">sinh</button>
                <button onclick="appendToDisplay('coh')" class="Btn-rvs">cosh</button>
                <button onclick="appendToDisplay('tah')" class="Btn-rvs">tanh</button>
                <button onclick="appendToDisplay('π')" class="Btn-rvs">&pi;</button>
                <button onclick="Rand()" class="Btn-rvs">Rand</button>
            </div>
            <div class="buttons">
                <button onclick="clearDisplay()" class="Btn-clr1 Btn-ac">AC</button>
                <button onclick="appendToDisplay('*(-1)'), calculateResult()" class="Btn-clr1">+&#8725;-</button>
                <button onclick="appendToDisplay('%')" class="Btn-clr1">%</button>
                <button onclick="appendToDisplay('/')" class="Btn-clr3">&divide;</button>
                <button onclick="appendToDisplay('7')" class="Btn-clr2">7</button>
                <button onclick="appendToDisplay('8')" class="Btn-clr2">8</button>
                <button onclick="appendToDisplay('9')" class="Btn-clr2">9</button>
                <button onclick="appendToDisplay('*')" class="Btn-clr3">&times;</button>
                <button onclick="appendToDisplay('4')" class="Btn-clr2">4</button>
                <button onclick="appendToDisplay('5')" class="Btn-clr2">5</button>
                <button onclick="appendToDisplay('6')" class="Btn-clr2">6</button>
                <button onclick="appendToDisplay('-')" class="Btn-clr3">&minus;</button>
                <button onclick="appendToDisplay('1')" class="Btn-clr2">1</button>
                <button onclick="appendToDisplay('2')" class="Btn-clr2">2</button>
                <button onclick="appendToDisplay('3')" class="Btn-clr2">3</button>
                <button onclick="appendToDisplay('+')" class="Btn-clr3">&plus;</button>
                <button onclick="appendToDisplay('0')" class="Btn-clr2">0</button>
                <button onclick="appendToDisplay('.')" class="Btn-clr2">
                    <div class="point"></div>
                </button>
                <button onclick="deleteLast()" class="Btn-clr2 Btn-del"><svg class="del-icon" viewBox="0 0 24 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1H21a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H7.5L1 8 7.5 1Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><line x1="10.5" y1="4.5" x2="17.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="17.5" y1="4.5" x2="10.5" y2="11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
                <button onclick="calculateResult()" class="Btn-clr3 Btn-eq">=</button>
            </div>
        </div>
    </div>
    <script src="./src/js/script.js"></script>
    <script src="./src/js/math.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(function() {});
      }
    </script>

</body>

</html>
